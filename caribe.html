<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Caribe</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 2.5rem; }
        .config-atendente { text-align: center; margin-bottom: 20px; }
        .config-atendente input { padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; width: 250px; }
        .categorias { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .categorias button { padding: 10px 18px; border: none; background: #333; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .categorias button.ativo { background: #f1c40f; color: black; font-weight: bold; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 220px; border: 2px solid transparent; }
        .card.ativo { background: #ffe066; border: 2px solid #ffcc00; }
        .nome { font-weight: bold; font-size: 18px; margin-bottom: 8px; color: #222; }
        .preco { color: #666; margin-bottom: 12px; font-size: 15px; font-weight: bold; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .controls button { width: 35px; height: 35px; border: none; background: #222; color: white; font-size: 20px; border-radius: 5px; cursor: pointer; }
        .controls span { font-size: 18px; font-weight: bold; min-width: 30px; }
        .total { margin-top: 40px; text-align: center; font-size: 36px; font-weight: bold; color: #1a1a1a; }
        .botoes { margin-top: 25px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .botoes button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .copiar { background: #27ae60; color: white; }
        .limpar { background: #c0392b; color: white; }
        .fechar { background: #2980b9; color: white; }
        .recibo { display: none; max-width: 450px; margin: 40px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.15); font-family: 'Courier New', Courier, monospace; }
        .linha { display: flex; justify-content: space-between; margin: 8px 0; }
        hr { border: none; border-top: 1px dashed #333; margin: 15px 0; }
    </style>
</head>
<body>

<h1>🍹 Restaurante Caribe</h1>

<div class="config-atendente">
    <input type="text" id="atendente" placeholder="Nome do Atendente" oninput="salvarAtendente()">
</div>

<div class="categorias">
    <button id="btn-combo" onclick="filtrar('combo', this)" class="ativo">Combos</button>
    <button onclick="filtrar('bebida', this)">Bebidas</button>
    <button onclick="filtrar('comida', this)">Comidas</button>
    <button onclick="filtrar('doce', this)">Doces</button>
</div>

<div class="grid" id="menu"></div>

<div class="total">TOTAL: R$ <span id="total">0</span></div>

<div class="botoes">
    <button class="copiar" onclick="copiar()">Copiar Conta</button>
    <button class="limpar" onclick="limpar()">Limpar</button>
    <button class="fechar" onclick="fecharPedido()">Fechar Pedido</button>
</div>

<div class="recibo" id="recibo">
    <h2>Restaurante Caribe</h2>
    <div id="dadosAtendenteRecibo"></div>
    <hr>
    <div id="itensRecibo"></div>
    <hr>
    <div class="linha">
        <div><b>TOTAL GERAL</b></div>
        <div><b id="totalRecibo"></b></div>
    </div>
</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1479621593016565810/JAhJ4fNKhJEdrXZIxu4ylBVoHrrSvhSEEoOZ3cmgCVjsaLyrK-ITWZWYUolNisZGzOV4";

    const produtos = [
        {id: "p0", nome:"Combo P", preco:3000, categoria:"combo"},
        {id: "p1", nome:"Combo Fury", preco:8000, categoria:"combo"},
        {id: "p2", nome:"Combo M", preco:6000, categoria:"combo"},
        {id: "p3", nome:"Suco de Limão", preco:1500, categoria:"bebida"},
        {id: "p4", nome:"Suco de Laranja", preco:1500, categoria:"bebida"},
        {id: "p5", nome:"Cola", preco:1500, categoria:"bebida"},
        {id: "p6", nome:"Taco", preco:1000, categoria:"comida"},
        {id: "p7", nome:"Hamburguer", preco:1000, categoria:"comida"},
        {id: "p8", nome:"Pizza", preco:1500, categoria:"comida"},
        {id: "p9", nome:"Batata Frita", preco:1000, categoria:"comida"},
        {id: "p10", nome:"Cupcake", preco:1000, categoria:"doce"},
        {id: "p11", nome:"Marshmallow", preco:1000, categoria:"doce"},
        {id: "p12", nome:"Bubalão Rosa", preco:1000, categoria:"doce"},
        {id: "p13", nome:"Bubalão Azul", preco:1000, categoria:"doce"},
        {id: "p14", nome:"Bubalão Amarelo", preco:1000, categoria:"doce"}
    ];

    let carrinho = {};
    produtos.forEach(p => carrinho[p.id] = 0);
    let categoriaAtual = "combo";

    window.onload = function() {
        const salvo = localStorage.getItem("atendenteCaribe");
        if (salvo) document.getElementById("atendente").value = salvo;
        carregar();
    };

    function salvarAtendente() {
        localStorage.setItem("atendenteCaribe", document.getElementById("atendente").value);
    }

    function carregar() {
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    let lista = produtos.filter(p => p.categoria === categoriaAtual);

    lista.forEach(p => {
        const qtd = carrinho[p.id] || 0;

        const div = document.createElement("div");
        div.className = `card ${qtd > 0 ? "ativo" : ""}`;

        div.innerHTML = `
            <div class="nome">${p.nome}</div>
            <div class="preco">R$ ${p.preco}</div>
            <div class="controls">
                <button onclick="alterar('${p.id}', -1)">-</button>
                <span>${qtd}</span>
                <button onclick="alterar('${p.id}', 1)">+</button>
            </div>
        `;

        menu.appendChild(div);
    });

    atualizarTotal();
}

    function alterar(id, delta) {
        let novaQtd = (carrinho[id] || 0) + delta;
        carrinho[id] = novaQtd < 0 ? 0 : novaQtd;
        carregar();
    }

    function atualizarTotal() {
        let total = 0;
        produtos.forEach(p => total += (carrinho[p.id] || 0) * p.preco);
        document.getElementById("total").innerText = total;
        return total;
    }

    function filtrar(cat, el) {
        categoriaAtual = cat;
        document.querySelectorAll(".categorias button").forEach(b => b.classList.remove("ativo"));
        el.classList.add("ativo");
        carregar();
    }

    function limpar() {
        produtos.forEach(p => carrinho[p.id] = 0);
        document.getElementById("recibo").style.display = "none";
        carregar();
    }

    function copiar() {
        const atendente = document.getElementById("atendente").value.trim();
        if(!atendente) return alert("Informe o atendente!");
        let texto = `Restaurante Caribe\nAtendente: ${atendente}\n\n`;
        produtos.forEach(p => { if(carrinho[p.id] > 0) texto += `${p.nome} x${carrinho[p.id]} - R$ ${carrinho[p.id]*p.preco}\n`; });
        texto += `\nTOTAL: R$ ${atualizarTotal()}`;
        navigator.clipboard.writeText(texto);
        alert("Copiado!");
    }

    async function fecharPedido() {
        const atendente = document.getElementById("atendente").value.trim();
        if(!atendente) return alert("Nome do atendente obrigatório!");
        let total = atualizarTotal();
        if(total === 0) return alert("Carrinho vazio!");

        let listaHtml = "";
        let itensDiscord = "";
        produtos.forEach(p => {
            if(carrinho[p.id] > 0) {
                let sub = carrinho[p.id] * p.preco;
                listaHtml += `<div class="linha"><div>${p.nome} x${carrinho[p.id]}</div><div>${sub}</div></div>`;
                itensDiscord += `• **${p.nome}** x${carrinho[p.id]} (R$ ${sub})\n`;
            }
        });

        document.getElementById("dadosAtendenteRecibo").innerText = "Atendente: " + atendente;
        document.getElementById("itensRecibo").innerHTML = listaHtml;
        document.getElementById("totalRecibo").innerText = "R$ " + total;
        document.getElementById("recibo").style.display = "block";

        const payload = { embeds: [{ title: "📝 NOVO PEDIDO", color: 16761871, description: itensDiscord, fields: [{ name: "Atendente", value: atendente, inline: true }, { name: "Total", value: `R$ ${total}`, inline: true }], timestamp: new Date() }] };
        try { await fetch(webhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); alert("Pedido enviado!"); } catch(e) { alert("Erro no envio!"); }
    }
</script>
</body>
</html>
